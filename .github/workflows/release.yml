# Build portable binaries for Windows / Linux / macOS and attach to a GitHub Release.
#
# Triggers:
#   - push tag v*  (e.g. git tag v0.1.37 && git push origin v0.1.37)
#   - workflow_dispatch with optional tag (rebuild / add assets to an existing release)
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to upload assets to (e.g. v0.1.36). Empty = use this run only (no upload unless on a tag)."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: ohmycopy.exe
            asset_name: ohmycopy-windows-x64.exe
            archive: OhMyCopy-windows-x64.zip

          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin_name: ohmycopy
            asset_name: ohmycopy-linux-x64
            archive: OhMyCopy-linux-x64.tar.gz

          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bin_name: ohmycopy
            asset_name: ohmycopy-macos-arm64
            archive: OhMyCopy-macos-arm64.tar.gz

          # Cross-compile Intel macOS on Apple Silicon runners (macos-13 is often queue-starved).
          - name: macos-x64
            os: macos-14
            target: x86_64-apple-darwin
            bin_name: ohmycopy
            asset_name: ohmycopy-macos-x64
            archive: OhMyCopy-macos-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI / tray deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libglib2.0-dev \
            libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libwayland-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage package
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            VER="${{ inputs.tag }}"
          fi
          VER="${VER#v}"
          STAGE="dist-stage"
          mkdir -p "$STAGE"
          BIN="target/${{ matrix.target }}/release/${{ matrix.bin_name }}"
          test -f "$BIN"
          cp "$BIN" "$STAGE/${{ matrix.asset_name }}"
          cp "$BIN" "$STAGE/${{ matrix.bin_name }}"

          # Linux: bundle libxdo (from tray-icon/enigo) so bare Debian does not fail with
          # "libxdo.so.3: cannot open shared object file" even for --headless.
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            mkdir -p "$STAGE/lib"
            # Prefer multiarch path; fall back to ldconfig lookup.
            for cand in \
              /usr/lib/x86_64-linux-gnu/libxdo.so.3 \
              /usr/lib64/libxdo.so.3 \
              /usr/lib/libxdo.so.3; do
              if [[ -f "$cand" ]]; then cp -aL "$cand" "$STAGE/lib/"; break; fi
            done
            if [[ ! -f "$STAGE/lib/libxdo.so.3" ]]; then
              # resolve via ldconfig if only soname is registered
              so=$(ldconfig -p 2>/dev/null | awk '/libxdo\.so\.3/ {print $NF; exit}')
              if [[ -n "${so:-}" && -f "$so" ]]; then cp -aL "$so" "$STAGE/lib/libxdo.so.3"; fi
            fi
            if [[ -f "$STAGE/lib/libxdo.so.3" ]]; then
              sudo apt-get install -y patchelf >/dev/null
              patchelf --set-rpath '$ORIGIN/lib' "$STAGE/${{ matrix.asset_name }}"
              patchelf --set-rpath '$ORIGIN/lib' "$STAGE/${{ matrix.bin_name }}"
              printf '%s\n' \
                '#!/usr/bin/env bash' \
                'set -euo pipefail' \
                'DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
                'export LD_LIBRARY_PATH="${DIR}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"' \
                'exec "${DIR}/ohmycopy" "$@"' \
                > "$STAGE/run-ohmycopy.sh"
              chmod +x "$STAGE/run-ohmycopy.sh"
            else
              echo "WARNING: libxdo.so.3 not found on builder; users need package libxdo3" >&2
            fi
          fi

          {
            echo "OhMyCopy ${VER} — ${{ matrix.name }}"
            echo ""
            echo "Run:"
            echo "  Windows: double-click ohmycopy.exe  (or ${{ matrix.asset_name }})"
            echo "  Linux:   chmod +x ohmycopy && ./ohmycopy"
            echo "           (or: ./run-ohmycopy.sh)"
            echo "  macOS:   chmod +x ohmycopy && ./ohmycopy"
            echo "           (if blocked: xattr -dr com.apple.quarantine .)"
            echo ""
            echo "Headless:  ./ohmycopy --headless"
            echo "Config:    ~/.ohmycopy  (Windows: %USERPROFILE%\\.ohmycopy)"
            echo "Password:  same on all devices. Port TCP/UDP 3721."
            echo ""
            if [[ "${{ runner.os }}" == "Linux" ]]; then
              echo "Linux desktop deps (if GUI fails after libxdo is bundled):"
              echo "  Debian/Ubuntu:"
              echo "    sudo apt install libgtk-3-0 libxdo3 libayatana-appindicator3-1 libxcb-render0 libxcb-shape0 libxcb-xfixes0"
              echo "  Fedora:"
              echo "    sudo dnf install gtk3 libxdo libappindicator-gtk3"
              echo ""
            fi
            echo "https://github.com/PriceNing/OhMyCopy"
          } > "$STAGE/README.txt"

          if [ -f docs/config-example.json ]; then cp docs/config-example.json "$STAGE/"; fi
          if [ -f docs/clients-example.json ]; then cp docs/clients-example.json "$STAGE/"; fi

          mkdir -p dist-out
          case "${{ matrix.archive }}" in
            *.zip)
              if command -v powershell >/dev/null 2>&1; then
                powershell -NoProfile -Command "Compress-Archive -Path (Join-Path (Get-Location) 'dist-stage\\*') -DestinationPath (Join-Path (Get-Location) 'dist-out\\${{ matrix.archive }}') -Force"
              else
                (cd "$STAGE" && zip -r "../dist-out/${{ matrix.archive }}" .)
              fi
              ;;
            *.tar.gz)
              tar -czf "dist-out/${{ matrix.archive }}" -C "$STAGE" .
              ;;
          esac
          # Standalone linux binary alone is NOT enough without lib/ — prefer the tar.gz.
          # Still publish the renamed binary for convenience when system libxdo is installed.
          cp "$STAGE/${{ matrix.asset_name }}" "dist-out/${{ matrix.asset_name }}"
          if [[ -d "$STAGE/lib" ]]; then
            # Also publish a self-contained mini bundle as zip of binary+lib for the standalone name case
            mkdir -p "dist-out/_bundle"
            cp "$STAGE/${{ matrix.asset_name }}" "dist-out/_bundle/"
            cp -a "$STAGE/lib" "dist-out/_bundle/"
            if [[ -f "$STAGE/run-ohmycopy.sh" ]]; then cp "$STAGE/run-ohmycopy.sh" "dist-out/_bundle/"; fi
            tar -czf "dist-out/${{ matrix.asset_name }}-with-libs.tar.gz" -C "dist-out/_bundle" .
            rm -rf "dist-out/_bundle"
          fi
          ls -la dist-out

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist-out/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release assets
    needs: build
    runs-on: ubuntu-latest
    # Tag push always publishes; dispatch publishes only when tag input is set.
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name 'ohmycopy-*' -o -name 'ohmycopy.exe' \) -print
          find artifacts -type f \( -name 'OhMyCopy-*.zip' -o -name 'OhMyCopy-*.tar.gz' -o -name 'ohmycopy-windows-*' -o -name 'ohmycopy-linux-*' -o -name 'ohmycopy-macos-*' \) \
            -exec cp -v {} release-assets/ \;
          ls -la release-assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*
          generate_release_notes: true
          body: |
            Portable multi-platform builds of OhMyCopy.

            | Asset | Platform |
            |-------|----------|
            | `OhMyCopy-windows-x64.zip` / `ohmycopy-windows-x64.exe` | Windows x64 |
            | `OhMyCopy-linux-x64.tar.gz` / `ohmycopy-linux-x64` | Linux x64 (glibc) |
            | `OhMyCopy-macos-arm64.tar.gz` / `ohmycopy-macos-arm64` | macOS Apple Silicon |
            | `OhMyCopy-macos-x64.tar.gz` / `ohmycopy-macos-x64` | macOS Intel |

            Config lives in `~/.ohmycopy`. Set the same shared password on every device. Default port **3721**.

            See [CHANGELOG.md](https://github.com/PriceNing/OhMyCopy/blob/master/CHANGELOG.md) for version history.
